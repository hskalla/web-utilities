<!DOCTYPE html>
<html lang="en">
  <head> Web Utilities </head>
  <body>
    <div id="counter">0</div>
    <script>
      let steps_since_start = 10;
      let total_steps = 100.0;
  
      let number = 1073; // Change this to change the final number we're counting up to.
  
      let animation = setInterval(countUp, 10);
  
      function countUp() {
        steps_since_start += 1;
        console.log(Math.ceil(Math.log(steps_since_start / total_steps) + 1));
        document.getElementById("counter").innerHTML = Math.ceil((Math.log(steps_since_start / total_steps) + 1) * number);
        if (steps_since_start >= total_steps) {
          document.getElementById("counter").innerHTML = number;
          clearInterval(animation);
        }
      }
    </script>
  </body>
</html>
